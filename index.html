<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>ArrMonitor</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--s2:#21262d;--border:#30363d;--text:#e6edf3;--muted:#7d8590;--green:#3fb950;--gG:rgba(63,185,80,0.4);--red:#f85149;--gR:rgba(248,81,73,0.4);--yellow:#d29922;--gY:rgba(210,153,34,0.35);--accent:#58a6ff;--r:12px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100dvh;padding:20px 16px 32px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(88,166,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(88,166,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#1c2a3a,#1f3a5f);border:1px solid rgba(88,166,255,.3);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(88,166,255,.15);font-size:19px}
.logo-text{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;background:linear-gradient(135deg,#e6edf3,#58a6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.btn-icon{width:36px;height:36px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.btn-icon:active{background:var(--s2);color:var(--text);border-color:var(--accent)}
.btn-icon svg{width:16px;height:16px}
.summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.s-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase}
.s-count{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:2px}
.s-count .up{color:var(--green)}.s-count .sep{color:var(--border);margin:0 2px}.s-count .tot{color:var(--muted);font-size:16px}
.last{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px}
.rbtn{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,#1c2a3a,#1f3a5f);border:1px solid rgba(88,166,255,.3);border-radius:8px;padding:9px 14px;color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.rbtn:active{background:rgba(88,166,255,.15)}
.rbtn svg{width:14px;height:14px}
.rbtn.spin svg{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.list{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;display:flex;align-items:center;gap:13px;transition:border-color .3s,box-shadow .3s;animation:fadeUp .4s ease both}
.card.sup{border-color:rgba(63,185,80,.25);box-shadow:0 0 20px rgba(63,185,80,.06)}
.card.sdown{border-color:rgba(248,81,73,.25);box-shadow:0 0 20px rgba(248,81,73,.06)}
.card.schk{border-color:rgba(210,153,34,.2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.svc-ico{width:41px;height:41px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:19px}
.svc-info{flex:1;min-width:0}
.svc-name{font-size:14px;font-weight:600;margin-bottom:2px}
.svc-url{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.svc-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px}
.sw{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.sl{width:13px;height:13px;border-radius:50%}
.sl.up{background:var(--green);box-shadow:0 0 0 3px rgba(63,185,80,.15),0 0 12px var(--gG);animation:pg 2.5s ease-in-out infinite}
.sl.down{background:var(--red);box-shadow:0 0 0 3px rgba(248,81,73,.15),0 0 12px var(--gR);animation:pr 1.5s ease-in-out infinite}
.sl.chk{background:var(--yellow);box-shadow:0 0 0 3px rgba(210,153,34,.15),0 0 10px var(--gY);animation:py .8s ease-in-out infinite}
.sl.idle{background:var(--s2);border:1px solid var(--border)}
@keyframes pg{0%,100%{box-shadow:0 0 0 3px rgba(63,185,80,.15),0 0 10px var(--gG)}50%{box-shadow:0 0 0 5px rgba(63,185,80,.08),0 0 18px var(--gG)}}
@keyframes pr{0%,100%{box-shadow:0 0 0 3px rgba(248,81,73,.15),0 0 10px var(--gR)}50%{box-shadow:0 0 0 6px rgba(248,81,73,.08),0 0 20px var(--gR)}}
@keyframes py{0%,100%{opacity:1}50%{opacity:.3}}
.stxt{font-size:9px;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;color:var(--muted)}
.stxt.up{color:var(--green)}.stxt.down{color:var(--red)}.stxt.chk{color:var(--yellow)}
.ping{display:inline-block;font-size:10px;font-family:'JetBrains Mono',monospace;background:var(--s2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--muted)}
.ping.f{color:var(--green);border-color:rgba(63,185,80,.25)}.ping.s{color:var(--yellow);border-color:rgba(210,153,34,.25)}
.ir{background:rgba(255,193,7,.1)}.iso{background:rgba(33,150,243,.1)}.ipr{background:rgba(156,39,176,.1)}.iau{background:rgba(0,188,212,.1)}.ics{background:rgba(76,175,80,.1)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-end}
.overlay.on{display:flex}
.sheet{background:var(--surface);border:1px solid var(--border);border-bottom:none;border-radius:20px 20px 0 0;width:100%;max-height:92dvh;overflow-y:auto;padding-bottom:36px;animation:shUp .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes shUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.sh-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.sh-title{font-size:15px;font-weight:600}
.x{width:26px;height:26px;background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
.sec{padding:15px 20px}.sec+.sec{border-top:1px solid var(--border)}
.slbl{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:10px}
.fr{display:flex;flex-direction:column;gap:4px}
.fl{font-size:12px;color:var(--muted);font-weight:500}
.fi{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .2s;width:100%}
.fi:focus{border-color:var(--accent)}.fi::placeholder{color:#3a4048}
.svc-row{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.svc-row-head{display:flex;align-items:center;gap:8px}
.svc-row-name{font-size:13px;font-weight:600;flex:1}
.svc-row-fields{display:grid;grid-template-columns:1fr 90px;gap:8px}
.savebtn{width:100%;background:linear-gradient(135deg,#1a4a7a,#1f5c99);border:1px solid rgba(88,166,255,.4);border-radius:10px;padding:13px;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.savebtn:active{background:rgba(88,166,255,.2)}
.trow{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.tinfo{display:flex;flex-direction:column;gap:2px}
.tname{font-size:13px;font-weight:500}.tdesc{font-size:11px;color:var(--muted)}
.tog{position:relative;width:44px;height:24px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tslider{position:absolute;inset:0;background:var(--s2);border:1px solid var(--border);border-radius:24px;cursor:pointer;transition:.3s}
.tslider::before{content:'';position:absolute;width:18px;height:18px;left:2px;top:2px;background:var(--muted);border-radius:50%;transition:.3s}
.tog input:checked+.tslider{background:rgba(63,185,80,.2);border-color:var(--green)}
.tog input:checked+.tslider::before{transform:translateX(20px);background:var(--green)}
footer{text-align:center;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;opacity:.35;margin-top:4px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-icon">📡</div>
      <div>
        <div class="logo-text">ArrMonitor</div>
        <div class="logo-sub">via tailscale</div>
      </div>
    </div>
    <div class="btn-icon" onclick="openSettings()" title="Configuración">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </div>
  </header>

  <div class="summary">
    <div>
      <div class="s-label">Estado general</div>
      <div class="s-count">
        <span class="up" id="upCount">—</span><span class="sep">/</span><span class="tot">5</span>
        <span style="font-size:12px;color:var(--muted)"> online</span>
      </div>
      <div class="last" id="lastCheck">Verificando...</div>
    </div>
    <button class="rbtn" id="rbtn" onclick="checkAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.5 15a9 9 0 1 1-2.5-8.6L23 10"/>
      </svg>
      Verificar
    </button>
  </div>

  <div class="list" id="list"></div>
  <footer>ArrMonitor v2.2</footer>
</div>

<div class="overlay" id="ov" onclick="if(event.target===this)closeSettings()">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sh-head">
      <span class="sh-title">Configuración</span>
      <div class="x" onclick="closeSettings()">✕</div>
    </div>
    <div class="sec">
      <div class="slbl">Host Tailscale</div>
      <div class="fg">
        <div class="fr">
          <div class="fl">IP Tailscale de tu PC</div>
          <input class="fi" id="cHost" placeholder="100.x.x.x" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
      </div>
    </div>
    <div class="sec">
      <div class="slbl">Servicios — Puerto y API Key opcional</div>
      <div class="fg" id="svcFields"></div>
    </div>
    <div class="sec">
      <div class="slbl">Opciones</div>
      <div class="fg">
        <div class="trow">
          <div class="tinfo"><div class="tname">Auto-refresh</div><div class="tdesc">Verificar cada 60 segundos</div></div>
          <label class="tog"><input type="checkbox" id="cAuto" checked><span class="tslider"></span></label>
        </div>
        <div class="trow">
          <div class="tinfo"><div class="tname">Usar HTTPS</div><div class="tdesc">Si tus servicios tienen certificado SSL</div></div>
          <label class="tog"><input type="checkbox" id="cHttps"><span class="tslider"></span></label>
        </div>
      </div>
    </div>
    <div class="sec">
      <button class="savebtn" onclick="saveSettings()">💾 Guardar y verificar</button>
    </div>
  </div>
</div>

<script>
const SVCS = [
  { id:'radarr',    name:'Radarr',     port:7878, ico:'🎬', cls:'ir',  paths:['/api/v3/health','/'] },
  { id:'sonarr',    name:'Sonarr',     port:8989, ico:'📺', cls:'iso', paths:['/api/v3/health','/'] },
  { id:'prowlarr',  name:'Prowlarr',   port:9696, ico:'🔍', cls:'ipr', paths:['/api/v1/health','/'] },
  { id:'autobrr',   name:'Autobrr',    port:7474, ico:'⚡', cls:'iau', paths:['/api/healthz/liveness','/'] },
  { id:'crossseed', name:'Cross-seed', port:2468, ico:'🌱', cls:'ics', paths:['/api/ping','/'] },
];

const DEFAULTS = {
  host: '100.93.228.17',
  https: false,
  autoRefresh: true,
  ports:   { radarr:7878, sonarr:8989, prowlarr:9696, autobrr:7474, crossseed:2468 },
  apikeys: { radarr:'', sonarr:'', prowlarr:'', autobrr:'', crossseed:'' }
};

let cfg = JSON.parse(JSON.stringify(DEFAULTS));
let st = {};
let timer = null;

function load() {
  try {
    const s = localStorage.getItem('am5');
    if (s) cfg = { ...DEFAULTS, ...JSON.parse(s) };
  } catch(e) {}
}

function save() {
  try { localStorage.setItem('am5', JSON.stringify(cfg)); } catch(e) {}
}

function base(svc) {
  return `${cfg.https ? 'https' : 'http'}://${cfg.host}:${cfg.ports[svc.id] || svc.port}`;
}

function render() {
  const l = document.getElementById('list');
  l.innerHTML = '';
  SVCS.forEach((s, i) => {
    const x = st[s.id] || { state:'idle' };
    const lc = { up:'up', down:'down', checking:'chk', idle:'idle' }[x.state] || 'idle';
    const cc = { up:'sup', down:'sdown', checking:'schk' }[x.state] || '';
    const lbl = { up:'UP', down:'DOWN', checking:'···', idle:'—' }[x.state] || '—';
    const pb = x.ping != null ? `<span class="ping ${x.ping < 300 ? 'f' : 's'}">${x.ping}ms</span>` : '';
    l.innerHTML += `
      <div class="card ${cc}" style="animation-delay:${i * .07}s">
        <div class="svc-ico ${s.cls}">${s.ico}</div>
        <div class="svc-info">
          <div class="svc-name">${s.name}</div>
          <div class="svc-url">${base(s)}</div>
          <div class="svc-meta">${x.msg || ''} ${pb}</div>
        </div>
        <div class="sw">
          <div class="sl ${lc}"></div>
          <div class="stxt ${lc}">${lbl}</div>
        </div>
      </div>`;
  });
}

function updateSum() {
  const up = Object.values(st).filter(x => x.state === 'up').length;
  const chk = Object.values(st).filter(x => x.state !== 'idle').length;
  document.getElementById('upCount').textContent = chk > 0 ? up : '—';
  if (chk > 0) {
    const t = new Date();
    document.getElementById('lastCheck').textContent =
      `Última: ${t.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit', second:'2-digit'})}`;
  }
}

async function checkSvc(svc) {
  st[svc.id] = { state:'checking', msg:'Verificando...' };
  render();
  const t0 = Date.now();
  const apikey = cfg.apikeys[svc.id];

  for (const path of svc.paths) {
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 7000);
      const headers = {};
      if (apikey) headers['X-Api-Key'] = apikey;
      const res = await fetch(base(svc) + path, {
        signal: ctrl.signal, cache: 'no-store', mode: 'cors', headers
      });
      clearTimeout(tid);
      const ping = Date.now() - t0;
      if (res.ok || res.status === 401 || res.status === 403 || res.status === 404) {
        let msg = 'Activo';
        if (res.ok) {
          const ct = res.headers.get('content-type') || '';
          if (ct.includes('json')) {
            try {
              const d = await res.json();
              if (Array.isArray(d) && d.length === 0) msg = 'Saludable ✓';
              else if (Array.isArray(d)) msg = `${d.length} alerta(s)`;
              else if (d.status === 'ok' || d.status === 'OK') msg = 'Saludable ✓';
              else msg = 'Respondiendo';
            } catch(e) { msg = 'Respondiendo'; }
          } else msg = 'Respondiendo';
        } else if (res.status === 401) msg = 'Activo (sin auth)';
        st[svc.id] = { state:'up', msg, ping };
        return;
      }
    } catch(e) {
      if (e.name === 'AbortError') {
        st[svc.id] = { state:'down', msg:'Timeout — no responde' };
        return;
      }
      // Intento de respaldo (fallback) sin CORS para servicios como Cross-seed
      try {
        const ctrl2 = new AbortController();
        const tid2 = setTimeout(() => ctrl2.abort(), 7000);
        const res2 = await fetch(base(svc) + path, {
          signal: ctrl2.signal, cache: 'no-store', mode: 'no-cors'
        });
        clearTimeout(tid2);
        if (res2.type === 'opaque' || res2.status === 0) {
          st[svc.id] = { state:'up', msg:'Activo', ping: Date.now() - t0 };
          return;
        }
      } catch(e2) {
        // Falla silenciosamente, continúa al siguiente path o termina como down
      }
    }
  }
  st[svc.id] = { state:'down', msg:'No accesible', ping: Date.now() - t0 };
}

async function checkAll() {
  const b = document.getElementById('rbtn');
  b.classList.add('spin'); b.disabled = true;
  await Promise.all(SVCS.map(s => checkSvc(s)));
  render(); updateSum();
  b.classList.remove('spin'); b.disabled = false;
}

function setupAuto() {
  if (timer) clearInterval(timer);
  if (cfg.autoRefresh) timer = setInterval(checkAll, 60000);
}

function buildSvcFields() {
  const c = document.getElementById('svcFields');
  c.innerHTML = '';
  SVCS.forEach(s => {
    c.innerHTML += `
      <div class="svc-row">
        <div class="svc-row-head">
          <span>${s.ico}</span>
          <span class="svc-row-name">${s.name}</span>
        </div>
        <div class="svc-row-fields">
          <div class="fr">
            <div class="fl">API Key (opcional)</div>
            <input class="fi" id="ak_${s.id}" value="${cfg.apikeys[s.id] || ''}" placeholder="Dejar vacío" autocomplete="off" spellcheck="false">
          </div>
          <div class="fr">
            <div class="fl">Puerto</div>
            <input class="fi" id="pt_${s.id}" value="${cfg.ports[s.id] || s.port}" type="number" min="1" max="65535" autocomplete="off">
          </div>
        </div>
      </div>`;
  });
}

function openSettings() {
  document.getElementById('cHost').value = cfg.host;
  document.getElementById('cAuto').checked = cfg.autoRefresh;
  document.getElementById('cHttps').checked = cfg.https;
  buildSvcFields();
  document.getElementById('ov').classList.add('on');
}

function closeSettings() { document.getElementById('ov').classList.remove('on'); }

function saveSettings() {
  cfg.host = document.getElementById('cHost').value.trim() || DEFAULTS.host;
  cfg.autoRefresh = document.getElementById('cAuto').checked;
  cfg.https = document.getElementById('cHttps').checked;
  SVCS.forEach(s => {
    const ak = document.getElementById(`ak_${s.id}`)?.value.trim();
    if (ak !== undefined) cfg.apikeys[s.id] = ak;
    const pt = parseInt(document.getElementById(`pt_${s.id}`)?.value);
    if (pt > 0 && pt < 65536) cfg.ports[s.id] = pt;
  });
  save(); setupAuto(); closeSettings();
  checkAll();
}

// Init — cargar config guardada (o defaults), arrancar directo
load();
render();
checkAll();
setupAuto();
</script>
</body>
</html>
